name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # Version comes from package.json's packageManager field — don't pin here
        # or pnpm/action-setup@v4 throws on the conflict.
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Crawl evals against live preview
        env:
          EVAL_BASE_URL: https://isberian-site-qbj6.vercel.app
        run: pnpm evals:crawl
